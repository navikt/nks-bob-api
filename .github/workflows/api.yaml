name: Build and deploy Api
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/api.yaml
      - api/**
      - shared/**
      - settings.gradle.kts
      - gradle/libs.versions.toml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/api.yaml
      - api/**
      - shared/**
      - settings.gradle.kts
      - gradle/libs.versions.toml
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: "write"
      contents: "write"
      id-token: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle to generate and submit dependency graphs
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          dependency-graph: generate-and-submit
      - name: Bygg og publiser docker bilde
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        id: docker-build-push
        with:
          dockerfile: api/Dockerfile
          team: nks-aiautomatisering
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: "write"
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy development
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: dev-gcp
          RESOURCE: api/.nais/dev-gcp.yaml,api/.nais/unleash-apitoken-dev.yaml
          VAR: ingress=nks-bob-api.ansatt.dev.nav.no
      - name: Deploy production
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # v2
        if: github.ref == 'refs/heads/main'
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          CLUSTER: prod-gcp
          RESOURCE: api/.nais/prod-gcp.yaml,api/.nais/unleash-apitoken-prod.yaml
          VAR: ingress=nks-bob-api.ansatt.nav.no

