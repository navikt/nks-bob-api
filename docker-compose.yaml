services:
  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=bobtilfolket
      - POSTGRES_USER=nks_bob_api_user
      - POSTGRES_DB=nks_bob_api_db
  wiremock:
    image: wiremock/wiremock:3.13.2
    ports:
      - "1080:8080"
    volumes:
      - ./mocks/wiremock/mappings:/home/wiremock/mappings
      - ./mocks/wiremock/__files:/home/wiremock/__files
  bigQuery:
    image: ghcr.io/goccy/bigquery-emulator:latest
    platform: linux/x86_64
    ports:
      - "9050:9050"
      - "9060:9060"
    volumes:
      - type: bind
        source: ./mocks
        target: /data
    command: |
      --project=local --data-from-yaml=/data/bq-data.yaml
  wonderwall:
    image: ghcr.io/nais/wonderwall:2025-06-16-100734-4bf3b1b
    ports:
      - "3000:3000"
    command: >
      --openid.client-id='id'
      --openid.well-known-url=http://localhost:8898/entraid/.well-known/openid-configuration
      --ingress=http://localhost:3000
      --bind-address=0.0.0.0:3000
      --upstream-host=host.docker.internal:8080
      --log-level=debug
      --log-format=text
      --auto-login=true
    restart: on-failure
    environment:
      WONDERWALL_OPENID_CLIENT_JWK: >
