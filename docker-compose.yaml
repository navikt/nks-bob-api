  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.3
    ports:
      - "8898:8080"
    restart: on-failure
    platform: linux/x86_64
    environment:
      JSON_CONFIG: |
        {
          "interactiveLogin": false,
          "tokenCallbacks": [
              {
              "issuerId": "entraid",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "authorization_code",
                  "claims": {
                    "aud": [
                      "nks-bob-api"
                    ],
                    "NAVident": "Z123456",
                    "groups": [
                      "admin"
                    ],
                    "azp": "consumer-client-id",
                    "idtyp": "app"
                  }
                },
                {
                  "requestParam": "grant_type",
                  "match": "client_credentials",
                  "claims": {
                    "aud": [
                      "nks-bob-vaskemaskin",
                      "nks-bob-api"
                    ],
                    "azp": "nks-bob-api",
                    "idtyp": "app"
                  }
                }
              ]
            }
          ]
        }

