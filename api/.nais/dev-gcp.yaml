apiVersion: nais.io/v1alpha1
kind: Application

metadata:
  labels:
    team: nks-aiautomatisering
  name: nks-bob-api
  namespace: nks-aiautomatisering
spec:
  envFrom:
    - secret: nks-bob-api-unleash-api-token
  image: "{{ image }}"
  port: 8080
  replicas:
    max: 2
    min: 1
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 25m
      memory: 704Mi
  accessPolicy:
    inbound:
      rules:
        - application: nks-bob-frontend
        - application: nks-bob-frontend-lokal
        - application: nks-bob-api-delete-old-conversations
        - application: nks-bob-api-upload-starred-messages
    outbound:
      external:
        - host: nks-aiautomatisering-unleash-api.nav.cloud.nais.io
      rules:
        - application: nks-kbs
        - application: nks-bob-vaskemaskin
        - application: logging
          namespace: nais-system
  env:
    - name: NKS_KBS_URL
      value: http://nks-kbs
    - name: NKS_KBS_SCOPE
      value: api://dev-gcp.nks-aiautomatisering.nks-kbs/.default
    - name: VASKEMASKIN_URL
      value: http://nks-bob-vaskemaskin
    - name: AZURE_LOGIN_URL
      value: https://login.microsoftonline.com/navno.onmicrosoft.com/oauth2/v2.0
    - name: NKS_BOB_API_SCOPE
      value: api://dev-gcp.nks-aiautomatisering.nks-bob-api/.default
    - name: NKS_BOB_API_ADMIN_GROUP
      value: dcb5ec4c-8027-428c-9dfd-15852388001c
    - name: GCP_TEAM_PROJECT_ID
      value: nks-aiautomatisering-prod-194a
    - name: STJERNEMARKERTE_SVAR_TABLE
      value: stjernemarkerte_svar_dev
  azure:
    application:
      tenant: nav.no # Gjør at man kan logge på med vanlig konto i dev-gcp
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: "dcb5ec4c-8027-428c-9dfd-15852388001c" # Administratorgruppe
          - id: "1a7b1fec-44c3-40c1-bf1d-f462b5a90a26" # Brukergruppe
    sidecar:
      enabled: true
      autoLogin: true
      autoLoginIgnorePaths:
        - /api/**
        - /internal/**
  ingresses:
    - https://{{ingress}}/
  liveness:
    path: /internal/is_alive
    initialDelay: 40
  readiness:
    path: /internal/is_ready
    initialDelay: 40
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
    autoInstrumentation:
      enabled: true
      runtime: java
  prometheus:
    enabled: true
    path: /internal/prometheus
  gcp:
    sqlInstances:
      - name: nks-bob-api
        tier: db-f1-micro
        collation: nb_NO.UTF8
        type: POSTGRES_16
        databases:
          - name: nks-bob-api
            envVarPrefix: DB
    bigQueryDatasets:
      - description: Originale kunnskapsartikler
        name: kunnskapsbase
        permission: READ
      - description: Testgrunnlag
        name: testgrunnlag
        permission: READWRITE
